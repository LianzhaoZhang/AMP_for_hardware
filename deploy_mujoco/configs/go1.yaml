# 
policy_path: "{LEGGED_GYM_ROOT_DIR}/logs/go1_amp/exported/policies/policy_1.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/go1/xml/go1.xml"

# Total simulation time
simulation_duration: 60.0
# Simulation time step
simulation_dt: 0.005
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 4

kp: 20.0
kd: 0.5

default_angles: [0.0, 0.72, -1.44, 
                 0.0, 0.72, -1.44, 
                 0.0, 0.72, -1.44, 
                 0.0, 0.72, -1.44]

ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [2.0, 2.0, 0.25]
cmd_max: [0.8, 0.5, 1.0]
num_actions: 12
num_obs: 42

clip_observations: 100.0
clip_actions: 100.0

# 站立过渡阶段
standup_duration: 2.0
stabilize_duration: 1.0
